<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Inventory ERP AI</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="page-bg"></div>

<header class="hero">

  <div>
    <h1>🍣 Inventory ERP AI</h1>
    <p class="hero-sub">Smart Inventory + AI Control System</p>
  </div>

  <div class="hero-buttons">

    <button class="ai-main-btn" onclick="runAI()">
      🤖 AI Predict
    </button>

    <button class="order-main-btn" onclick="generateOrders()">
      📦 Generate Orders
    </button>

  </div>

</header>

<section class="topbar">

  <div class="card kpi-card">
    <div class="kpi-title">TOTAL ITEMS</div>
    <div class="kpi-value" id="totalItems">0</div>
  </div>

  <div class="card kpi-card">
    <div class="kpi-title">HOME STOCK</div>
    <div class="kpi-value" id="homeStock">0</div>
  </div>

  <div class="card kpi-card">
    <div class="kpi-title">STORE STOCK</div>
    <div class="kpi-value" id="storeStock">0</div>
  </div>

</section>

<input
  type="text"
  id="search"
  class="search"
  placeholder="🔍 Search inventory..."
/>

<section class="card add-section">

  <h2 class="section-title">➕ Add Item</h2>

  <div class="add-box">

    <input id="newName" placeholder="Item name">

    <input id="newHome" type="number" placeholder="Home qty">

    <input id="newStore" type="number" placeholder="Store qty">

    <select id="newCategory">
      <option value="NIGIRI">NIGIRI</option>
      <option value="ROLL">ROLL</option>
      <option value="DONBURI">DONBURI</option>
      <option value="DRINK">DRINK</option>
      <option value="SIDE">SIDE</option>
    </select>

    <select id="newSupplier">
      <option value="길모아">길모아</option>
      <option value="서비스푸드">서비스푸드</option>
      <option value="비드푸드">비드푸드</option>
      <option value="메가푸드">메가푸드</option>
      <option value="JFC">JFC</option>
      <option value="도쿄푸드">도쿄푸드</option>
      <option value="오션푸드">오션푸드</option>
    </select>

    <input id="newPrice" type="number" placeholder="Price">

    <button class="add-btn" onclick="createItem()">Add</button>

  </div>

</section>

<div id="stockGrid" class="grid"></div>

<section class="logs">
  <div class="logs-header">📜 Recent Logs</div>
  <div id="logs"></div>
</section>

<script>

let STOCK = [];

/* SAFE INIT */
document.addEventListener("DOMContentLoaded", () => {

  const search = document.getElementById("search");

  if(search){
    search.addEventListener("input", (e) => {

      const keyword = e.target.value.toLowerCase();

      const filtered = STOCK.filter(i =>
        (i.name || "").toLowerCase().includes(keyword)
      );

      renderStock(filtered);
    });
  }

  loadDashboard();
});

/* AI ORDER */
function calculateAIOrder(item){

  const total =
    Number(item.home_qty || 0) +
    Number(item.store_qty || 0);

  const min = Number(item.min_stock || 15);

  let r = Math.ceil((min - total) * 1.3);

  if(r < 0) r = 0;
  if(r > 0 && r < 3) r = 3;

  return r;
}

/* LOAD */
async function loadDashboard(){
  await loadStock();
  await loadLogs();
}

async function loadStock(){

  try{

    const res = await fetch("/api/stock");
    const json = await res.json();

    if(!json.success) return alert(json.error);

    STOCK = json.data || [];

    STOCK.forEach(i => {
      i.ai_order = calculateAIOrder(i);
    });

    renderStock(STOCK);
    updateKPI(STOCK);

  }catch(e){
    console.error(e);
  }
}

/* KPI */
function updateKPI(items){

  document.getElementById("totalItems").innerText = items.length;

  document.getElementById("homeStock").innerText =
    items.reduce((a,b)=>a + Number(b.home_qty||0),0);

  document.getElementById("storeStock").innerText =
    items.reduce((a,b)=>a + Number(b.store_qty||0),0);

}

/* RENDER */
function renderStock(items){

  const grid = document.getElementById("stockGrid");
  if(!grid) return;

  grid.innerHTML = items.map(item => {

    const total =
      Number(item.home_qty||0) +
      Number(item.store_qty||0);

    let status = "GOOD";
    let cls = "good";

    if(total <= 5){ status="LOW"; cls="low"; }
    else if(total <= 15){ status="MEDIUM"; cls="medium"; }

    return `
      <div class="stock-card">

        <div class="stock-title">${item.name || "-"}</div>

        <div class="row">
          <span>🏢 ${item.supplier || "-"}</span>
          <span>$${Number(item.price||0).toFixed(2)}</span>
        </div>

        <div class="row">
          <span>HOME</span>
          <span>${item.home_qty}</span>
        </div>

        <div class="row">
          <span>STORE</span>
          <span>${item.store_qty}</span>
        </div>

        <div class="row">
          <span>AI</span>
          <span>${item.ai_order}</span>
        </div>

        <div class="status-badge ${cls}">
          ${status}
        </div>

        <input type="number" id="qty-${item.id}" value="1">

        <div class="actions">

          <button onclick="adjustStock(${item.id})">Adjust</button>
          <button onclick="sellItem(${item.id})">Sell</button>

        </div>

        <div class="actions">

          <button onclick="move(${item.id},'home','store')">H→S</button>
          <button onclick="move(${item.id},'store','home')">S→H</button>

        </div>

      </div>
    `;
  }).join("");
}

/* CREATE */
async function createItem(){

  const name = document.getElementById("newName").value;
  if(!name) return alert("Name required");

  const body = {
    name,
    home_qty:Number(document.getElementById("newHome").value||0),
    store_qty:Number(document.getElementById("newStore").value||0),
    supplier:document.getElementById("newSupplier").value,
    category:document.getElementById("newCategory").value,
    price:Number(document.getElementById("newPrice").value||5),
    min_stock:15,
    ai_enabled:true
  };

  const res = await fetch("/api/item",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });

  const json = await res.json();

  if(!json.success) return alert(json.error);

  loadDashboard();
}

/* SELL */
async function sellItem(id){

  const qty = Number(document.getElementById(`qty-${id}`)?.value||1);

  await fetch("/api/order",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({stock_id:id,qty})
  });

  loadDashboard();
}

/* OTHER OPS */
async function adjustStock(id){

  const home = Number(document.getElementById(`home-adjust-${id}`)?.value||0);
  const store = Number(document.getElementById(`store-adjust-${id}`)?.value||0);

  await fetch("/api/adjust",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({stock_id:id,home_qty:home,store_qty:store})
  });

  loadDashboard();
}

async function move(id,from,to){

  const qty = Number(document.getElementById(`qty-${id}`)?.value||1);

  await fetch("/api/transfer",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({stock_id:id,qty,from,to})
  });

  loadDashboard();
}

/* LOGS */
async function loadLogs(){

  const res = await fetch("/api/log");
  const json = await res.json();

  const data = json.data || [];

  document.getElementById("logs").innerHTML =
    data.map(l=>`
      <div class="log-item">
        ${l.action} | ${l.qty} | ${l.note}
      </div>
    `).join("");
}

/* AI */
async function runAI(){
  await fetch("/api/ai-predict");
  loadDashboard();
}

/* ORDER */
async function generateOrders(){
  const res = await fetch("/api/generate-order");
  const json = await res.json();
  alert(JSON.stringify(json.orders,null,2));
}

</script>

</body>
</html>
