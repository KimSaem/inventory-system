<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Inventory ERP AI</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="page-bg"></div>

<header class="hero">

  <div>
    <h1>🍣 Inventory ERP AI</h1>
    <p class="hero-sub">
      Smart Sushi Inventory + POS System
    </p>
  </div>

  <div class="hero-buttons">
    <button class="ai-main-btn" onclick="runAI()">
      🤖 AI Predict
    </button>

    <button class="order-main-btn" onclick="generateOrders()">
      📦 Generate Orders
    </button>
  </div>

</header>

<section class="topbar">

  <div class="card kpi-card">
    <div class="kpi-title">TOTAL ITEMS</div>
    <div class="kpi-value" id="totalItems">0</div>
  </div>

  <div class="card kpi-card">
    <div class="kpi-title">HOME STOCK</div>
    <div class="kpi-value" id="homeStock">0</div>
  </div>

  <div class="card kpi-card">
    <div class="kpi-title">STORE STOCK</div>
    <div class="kpi-value" id="storeStock">0</div>
  </div>

</section>

<input
  type="text"
  id="search"
  class="search"
  placeholder="🔍 Search inventory..."
/>

<section class="card add-section">

  <h2 class="section-title">
    ➕ Add Inventory Item
  </h2>

  <div class="add-box">

    <input
      id="newName"
      placeholder="Item name"
    >

    <input
      id="newHome"
      type="number"
      placeholder="Home qty"
    >

    <input
      id="newStore"
      type="number"
      placeholder="Store qty"
    >

    <select id="newCategory">

      <option value="NIGIRI">
        NIGIRI
      </option>

      <option value="ROLL">
        ROLL
      </option>

      <option value="DONBURI">
        DONBURI
      </option>

      <option value="DRINK">
        DRINK
      </option>

      <option value="SIDE">
        SIDE
      </option>

    </select>

    <select id="newSupplier">

      <option value="길모아">
        길모아
      </option>

      <option value="서비스푸드">
        서비스푸드
      </option>

      <option value="비드푸드">
        비드푸드
      </option>

      <option value="메가푸드">
        메가푸드
      </option>

      <option value="JFC">
        JFC
      </option>

      <option value="도쿄푸드">
        도쿄푸드
      </option>

      <option value="오션푸드">
        오션푸드
      </option>

    </select>

    <input
      id="newPrice"
      type="number"
      placeholder="Price"
    >

    <button
      class="add-btn"
      onclick="createItem()"
    >
      Add Item
    </button>

  </div>

</section>

<div id="alerts"></div>

<div id="stockGrid" class="grid"></div>

<section class="logs">

  <div class="logs-header">
    📜 Recent Logs
  </div>

  <div id="logs"></div>

</section>

<script>

let STOCK = [];

function calculateAIOrder(item){

  const total =
    Number(item.home_qty || 0) +
    Number(item.store_qty || 0);

  const min =
    Number(item.min_stock || 15);

  let recommend =
    Math.ceil((min - total) * 1.3);

  if(recommend < 0)
    recommend = 0;

  if(recommend > 0 && recommend < 3)
    recommend = 3;

  return recommend;
}

async function loadDashboard(){

  await loadStock();
  await loadLogs();
}

async function loadStock(){

  const res =
    await fetch("/api/stock");

  const json =
    await res.json();

  if(!json.success){
    alert(json.error);
    return;
  }

  STOCK = json.data || [];

  STOCK.forEach(item=>{

    item.ai_order =
      calculateAIOrder(item);

  });

  renderStock(STOCK);
  updateKPI(STOCK);
}

function updateKPI(items){

  document.getElementById("totalItems").innerText =
    items.length;

  document.getElementById("homeStock").innerText =
    items.reduce(
      (a,b)=>a + Number(b.home_qty || 0),
      0
    );

  document.getElementById("storeStock").innerText =
    items.reduce(
      (a,b)=>a + Number(b.store_qty || 0),
      0
    );
}

function renderStock(items){

  const grid =
    document.getElementById("stockGrid");

  grid.innerHTML =
    items.map(item => {

      const total =
        Number(item.home_qty || 0) +
        Number(item.store_qty || 0);

      let status =
        "GOOD";

      let statusClass =
        "good";

      if(total <= 5){

        status =
          "LOW";

        statusClass =
          "low";
      }
      else if(total <= 15){

        status =
          "MEDIUM";

        statusClass =
          "medium";
      }

      return `

      <div class="stock-card">

        <div class="stock-top">

          <div>

            <div class="stock-title">
              ${item.name}
            </div>

            <div class="stock-category">
              ${item.category || "GENERAL"}
            </div>

          </div>

          <div class="price-tag">
            $${Number(item.price || 0).toFixed(2)}
          </div>

        </div>

        <div class="supplier-tag">
          🏢 ${item.supplier || "-"}
        </div>

        <div class="stock-stats">

          <div class="mini-stat">

            <div class="mini-label">
              HOME
            </div>

            <div class="mini-value">
              ${item.home_qty}
            </div>

          </div>

          <div class="mini-stat">

            <div class="mini-label">
              STORE
            </div>

            <div class="mini-value">
              ${item.store_qty}
            </div>

          </div>

          <div class="mini-stat">

            <div class="mini-label">
              AI ORDER
            </div>

            <div class="mini-value">
              ${item.ai_order}
            </div>

          </div>

        </div>

        <div class="status-row">

          <div class="status-badge ${statusClass}">
            ${status}
          </div>

          <div class="min-stock">
            MIN ${item.min_stock || 15}
          </div>

        </div>

        <input
          type="number"
          id="qty-${item.id}"
          value="1"
          min="1"
          class="qty-input"
        >

        <div class="actions">

          <input
            type="number"
            id="home-adjust-${item.id}"
            value="${item.home_qty}"
          >

          <input
            type="number"
            id="store-adjust-${item.id}"
            value="${item.store_qty}"
          >

        </div>

        <div class="actions">

          <button
            class="add-btn"
            onclick="adjustStock(${item.id})"
          >
            Adjust
          </button>

          <button
            class="store-btn"
            onclick="sellItem(${item.id})"
          >
            Sell
          </button>

        </div>

        <div class="actions">

          <button
            class="home-btn"
            onclick="move(${item.id}, 'home', 'store')"
          >
            Home → Store
          </button>

          <button
            class="store-btn"
            onclick="move(${item.id}, 'store', 'home')"
          >
            Store → Home
          </button>

        </div>

        <div class="actions">

          <button
            class="ai-btn"
            onclick="generatePO(${item.id})"
          >
            AI Order
          </button>

          <button
            class="delete-btn"
            onclick="deleteItem(${item.id})"
          >
            Delete
          </button>

        </div>

      </div>

      `;

    }).join("");
}

function generatePO(id){

  const item =
    STOCK.find(i=>i.id === id);

  if(!item) return;

  alert(

`📦 AI PURCHASE ORDER

ITEM:
${item.name}

CATEGORY:
${item.category}

SUPPLIER:
${item.supplier}

AI RECOMMENDED:
${item.ai_order}

CURRENT STOCK:
HOME ${item.home_qty}
STORE ${item.store_qty}`

  );
}

async function createItem(){

  const name =
    document.getElementById("newName").value;

  const home_qty =
    Number(
      document.getElementById("newHome").value || 0
    );

  const store_qty =
    Number(
      document.getElementById("newStore").value || 0
    );

  const supplier =
    document.getElementById("newSupplier").value;

  const category =
    document.getElementById("newCategory").value;

  const price =
    Number(
      document.getElementById("newPrice").value || 0
    );

  if(!name){

    alert("상품명 입력");
    return;
  }

  const res =
    await fetch("/api/item",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        name,
        home_qty,
        store_qty,
        supplier,
        category,
        price,

        min_stock:15,

        ai_enabled:true,

        options:[
          "Extra Salmon",
          "No Wasabi",
          "Large Rice"
        ]

      })

    });

  const json =
    await res.json();

  if(!json.success){

    alert(json.error);
    return;
  }

  document.getElementById("newName").value = "";
  document.getElementById("newHome").value = "";
  document.getElementById("newStore").value = "";
  document.getElementById("newPrice").value = "";

  loadDashboard();
}

async function adjustStock(stock_id){

  const home_qty =
    Number(
      document.getElementById(
        `home-adjust-${stock_id}`
      ).value
    );

  const store_qty =
    Number(
      document.getElementById(
        `store-adjust-${stock_id}`
      ).value
    );

  const res =
    await fetch("/api/adjust",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        stock_id,
        home_qty,
        store_qty
      })

    });

  const json =
    await res.json();

  if(!json.success){

    alert(json.error);
    return;
  }

  loadDashboard();
}

async function sellItem(stock_id){

  const qty =
    Number(
      document.getElementById(
        `qty-${stock_id}`
      ).value
    );

  const res =
    await fetch("/api/order",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        stock_id,
        qty
      })

    });

  const json =
    await res.json();

  if(!json.success){

    alert(json.error);
    return;
  }

  loadDashboard();
}

async function move(stock_id, from, to){

  const qty =
    Number(
      document.getElementById(
        `qty-${stock_id}`
      ).value
    );

  const res =
    await fetch("/api/transfer",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        stock_id,
        qty,
        from,
        to
      })

    });

  const json =
    await res.json();

  if(!json.success){

    alert(json.error);
    return;
  }

  loadDashboard();
}

async function deleteItem(id){

  if(!confirm("삭제할까?"))
    return;

  const res =
    await fetch("/api/item",{

      method:"DELETE",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({id})

    });

  const json =
    await res.json();

  if(!json.success){

    alert(json.error);
    return;
  }

  loadDashboard();
}

async function loadLogs(){

  const res =
    await fetch("/api/log");

  const json =
    await res.json();

  const data =
    json.data || [];

  document.getElementById("logs").innerHTML =

    data.map(log=>`

      <div class="log-item">

        📦 STOCK #${log.stock_id}
        |
        ${log.action}
        |
        ${log.qty}
        |
        ${log.note}

      </div>

    `).join("");
}

async function runAI(){

  const res =
    await fetch("/api/ai-predict");

  const json =
    await res.json();

  if(!json.success){

    alert(json.error);
    return;
  }

  alert("AI prediction completed");

  loadDashboard();
}

async function generateOrders(){

  const res =
    await fetch("/api/generate-order");

  const json =
    await res.json();

  if(!json.success){

    alert(json.error);
    return;
  }

  let text = "";

  for(const supplier in json.orders){

    text += `\n====================\n`;

    text += `📦 ${supplier}\n`;

    text += `====================\n`;

    json.orders[supplier]
      .forEach(i=>{

        text +=
          `${i.name} x ${i.qty}\n`;

      });
  }

  alert(text || "발주 없음");
}

document
  .getElementById("search")
  .addEventListener("input",(e)=>{

    const keyword =
      e.target.value.toLowerCase();

    const filtered =
      STOCK.filter(i=>

        i.name
          .toLowerCase()
          .includes(keyword)

      );

    renderStock(filtered);
  });

loadDashboard();

setInterval(loadStock, 5000);
setInterval(loadLogs, 10000);

</script>

</body>
</html>
