<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Inventory ERP AI</title>
<link rel="stylesheet" href="/css/style.css">
<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f5f5f7;
  color:#111;
  padding:20px;
}

h1{
  font-size:34px;
  margin-bottom:25px;
}

.topbar{
  display:flex;
  gap:15px;
  margin-bottom:25px;
  flex-wrap:wrap;
}

.card{
  background:white;
  border-radius:24px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.kpi{
  flex:1;
  min-width:220px;
}

.kpi-title{
  font-size:14px;
  opacity:0.6;
}

.kpi-value{
  font-size:32px;
  font-weight:700;
  margin-top:10px;
}

.search{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  background:white;
  margin-bottom:25px;
  font-size:16px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.add-box{
  display:flex;
  gap:10px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

.add-box input,
.add-box select{
  flex:1;
  min-width:150px;
}

input,select{
  padding:14px;
  border:none;
  border-radius:16px;
  background:white;
  font-size:15px;
}

button{
  border:none;
  border-radius:16px;
  padding:14px 18px;
  cursor:pointer;
  font-weight:700;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

.add-btn{
  background:#0071e3;
  color:white;
}

.delete-btn{
  background:#ff3b30;
  color:white;
}

.home-btn{
  background:#0071e3;
  color:white;
}

.store-btn{
  background:#34c759;
  color:white;
}

.ai-btn{
  background:#111;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:20px;
}

.stock-card{
  background:white;
  border-radius:24px;
  padding:22px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.stock-title{
  font-size:24px;
  font-weight:700;
  margin-bottom:18px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.qty{
  font-weight:700;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

.logs{
  margin-top:40px;
}

.log-item{
  background:white;
  padding:16px;
  border-radius:18px;
  margin-bottom:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.04);
}

.low{
  color:#ff3b30;
}

.medium{
  color:#ff9500;
}

.good{
  color:#34c759;
}

.ai-box{
  margin-top:12px;
  padding:10px;
  border-radius:14px;
  background:#f4f7ff;
}

</style>
</head>

<body>

<h1>📦 Inventory ERP AI</h1>

<div class="topbar">
  <button class="add-btn" onclick="runAI()">
    🤖 AI Predict
  </button>

  <button class="store-btn" onclick="generateOrders()">
    📦 Generate Orders
  </button>

  <div class="card kpi">
    <div class="kpi-title">TOTAL ITEMS</div>
    <div class="kpi-value" id="totalItems">0</div>
  </div>

  <div class="card kpi">
    <div class="kpi-title">HOME STOCK</div>
    <div class="kpi-value" id="homeStock">0</div>
  </div>

  <div class="card kpi">
    <div class="kpi-title">STORE STOCK</div>
    <div class="kpi-value" id="storeStock">0</div>
  </div>

</div>

<input
  type="text"
  id="search"
  class="search"
  placeholder="Search inventory..."
/>

<div class="add-box">

  <input id="newName" placeholder="Item name">

  <input id="newHome" type="number" placeholder="Home qty">

  <input id="newStore" type="number" placeholder="Store qty">

  <select id="newSupplier">
    <option value="길모아">길모아</option>
    <option value="서비스푸드">서비스푸드</option>
    <option value="비드푸드">비드푸드</option>
    <option value="메가푸드">메가푸드</option>
    <option value="JFC">JFC</option>
    <option value="도쿄푸드">도쿄푸드</option>
    <option value="오션푸드">오션푸드</option>
  </select>

  <button class="add-btn" onclick="createItem()">
    Add Item
  </button>

</div>

<div id="alerts"></div>

<div id="stockGrid" class="grid"></div>

<div class="logs">
  <h2 style="margin-bottom:20px;">📜 Recent Logs</h2>
  <div id="logs"></div>
</div>

<script>

let STOCK = [];

function calculateAIOrder(item){

  const total =
    Number(item.home_qty || 0) +
    Number(item.store_qty || 0);

  const min =
    Number(item.min_stock || 15);

  let recommend =
    Math.ceil((min - total) * 1.3);

  if(recommend < 0)
    recommend = 0;

  if(recommend > 0 && recommend < 3)
    recommend = 3;

  return recommend;
}

async function loadDashboard(){

  await loadStock();
  await loadLogs();
}

async function loadStock(){

  const res =
    await fetch("/api/stock");

  const json =
    await res.json();

  if(!json.success){
    alert(json.error);
    return;
  }

  STOCK = json.data || [];

  STOCK.forEach(item=>{
    item.ai_order =
      calculateAIOrder(item);
  });

  renderStock(STOCK);
  updateKPI(STOCK);
}

function updateKPI(items){

  document.getElementById("totalItems").innerText =
    items.length;

  document.getElementById("homeStock").innerText =
    items.reduce(
      (a,b)=>a + Number(b.home_qty || 0),
      0
    );

  document.getElementById("storeStock").innerText =
    items.reduce(
      (a,b)=>a + Number(b.store_qty || 0),
      0
    );
}

function renderStock(items){

  const grid =
    document.getElementById("stockGrid");

  grid.innerHTML = items.map(item => {

    const total =
      Number(item.home_qty || 0) +
      Number(item.store_qty || 0);

    let statusClass = "good";
    let warningText = "";

    if(total <= 5){
      statusClass = "low";
      warningText = "⚠ LOW STOCK";
    }
    else if(total <= 15){
      statusClass = "medium";
    }

    return `

      <div class="stock-card">

        <div class="stock-title">
          ${item.name}
        </div>

        <div class="row">
          <span>🏢 Supplier</span>
          <span>${item.supplier || "-"}</span>
        </div>

        <div class="row">
          <span>🏠 Home</span>
          <span class="qty">
            ${item.home_qty}
          </span>
        </div>

        <div class="row">
          <span>🏪 Store</span>
          <span class="qty">
            ${item.store_qty}
          </span>
        </div>

        <div class="row">
          <span>Status</span>
          <span class="${statusClass}">
            ${statusClass.toUpperCase()}
          </span>
        </div>

        <div class="ai-box">

          <div class="row">
            <span>🤖 AI Order</span>
            <span class="qty">
              ${item.ai_order}
            </span>
          </div>

          <div class="row">
            <span>📦 Min Stock</span>
            <span class="qty">
              ${item.min_stock || 15}
            </span>
          </div>

        </div>

        ${warningText ? `
        <div style="
          margin-top:12px;
          padding:8px 12px;
          background:#fff3f3;
          color:#ff3b30;
          border-radius:12px;
          font-size:13px;
          font-weight:700;
        ">
          ${warningText}
        </div>
        ` : ""}

        <input
          type="number"
          id="qty-${item.id}"
          value="1"
          min="1"
        />

        <div class="actions">

          <input
            type="number"
            id="home-adjust-${item.id}"
            value="${item.home_qty}"
          >

          <input
            type="number"
            id="store-adjust-${item.id}"
            value="${item.store_qty}"
          >

        </div>

        <div class="actions">

          <button
            class="add-btn"
            onclick="adjustStock(${item.id})"
          >
            Adjust
          </button>

          <button
            class="store-btn"
            onclick="sellItem(${item.id})"
          >
            Sell
          </button>

        </div>

        <div class="actions">

          <button
            class="home-btn"
            onclick="move(${item.id}, 'home', 'store')"
          >
            Home → Store
          </button>

          <button
            class="store-btn"
            onclick="move(${item.id}, 'store', 'home')"
          >
            Store → Home
          </button>

        </div>

        <div class="actions">

          <button
            class="ai-btn"
            onclick="generatePO(${item.id})"
          >
            AI Order
          </button>

          <button
            class="delete-btn"
            onclick="deleteItem(${item.id})"
          >
            Delete
          </button>

        </div>

      </div>

    `;
  }).join("");
}

function generatePO(id){

  const item =
    STOCK.find(i=>i.id === id);

  if(!item) return;

  const qty =
    item.ai_order || 0;

  alert(
`AI PURCHASE ORDER

ITEM:
${item.name}

SUPPLIER:
${item.supplier}

RECOMMENDED:
${qty}

CURRENT:
HOME ${item.home_qty}
STORE ${item.store_qty}`
  );
}

async function createItem(){

  const name =
    document.getElementById("newName").value;

  const home_qty =
    Number(
      document.getElementById("newHome").value || 0
    );

  const store_qty =
    Number(
      document.getElementById("newStore").value || 0
    );

  const supplier =
    document.getElementById("newSupplier").value;

  const res =
    await fetch("/api/item",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name,
        home_qty,
        store_qty,
        supplier,
        min_stock:15,
        ai_enabled:true
      })
    });

  const json =
    await res.json();

  if(!json.success){
    alert(json.error);
    return;
  }

  document.getElementById("newName").value="";
  document.getElementById("newHome").value="";
  document.getElementById("newStore").value="";

  loadDashboard();
}

async function adjustStock(stock_id){

  const home_qty =
    Number(
      document.getElementById(
        `home-adjust-${stock_id}`
      ).value
    );

  const store_qty =
    Number(
      document.getElementById(
        `store-adjust-${stock_id}`
      ).value
    );

  const res =
    await fetch("/api/adjust",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        stock_id,
        home_qty,
        store_qty
      })
    });

  const json =
    await res.json();

  if(!json.success){
    alert(json.error);
    return;
  }

  loadDashboard();
}

async function sellItem(stock_id){

  const qty =
    Number(
      document.getElementById(
        `qty-${stock_id}`
      ).value
    );

  const res =
    await fetch("/api/order",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        stock_id,
        qty
      })
    });

  const json =
    await res.json();

  if(!json.success){
    alert(json.error);
    return;
  }

  loadDashboard();
}

async function move(stock_id, from, to){

  const qty =
    Number(
      document.getElementById(
        `qty-${stock_id}`
      ).value
    );

  const res =
    await fetch("/api/transfer",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        stock_id,
        qty,
        from,
        to
      })
    });

  const json =
    await res.json();

  if(!json.success){
    alert(json.error);
    return;
  }

  loadDashboard();
}

async function deleteItem(id){

  if(!confirm("삭제할까?"))
    return;

  const res =
    await fetch("/api/item",{
      method:"DELETE",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({id})
    });

  const json =
    await res.json();

  if(!json.success){
    alert(json.error);
    return;
  }

  loadDashboard();
}

async function loadLogs(){

  const res =
    await fetch("/api/log");

  const json =
    await res.json();

  const data =
    json.data || [];

  document.getElementById("logs").innerHTML =
    data.map(log=>`

      <div class="log-item">

        📦 STOCK #${log.stock_id}
        |
        ${log.action}
        |
        ${log.qty}
        |
        ${log.note}

      </div>

    `).join("");
}

async function runAI(){

  const res =
    await fetch("/api/ai-predict");

  const json =
    await res.json();

  if(!json.success){
    alert(json.error);
    return;
  }

  alert("AI prediction completed");

  loadDashboard();
}

async function generateOrders(){

  const res =
    await fetch("/api/generate-order");

  const json =
    await res.json();

  if(!json.success){
    alert(json.error);
    return;
  }

  console.log(json.orders);

  let text = "";

  for(const supplier in json.orders){

    text += `\n====================\n`;
    text += `📦 ${supplier}\n`;
    text += `====================\n`;

    json.orders[supplier]
      .forEach(i=>{

        text += `${i.name} x ${i.qty}\n`;

      });
  }

  alert(text || "발주 없음");
}
document
  .getElementById("search")
  .addEventListener("input",(e)=>{

    const keyword =
      e.target.value.toLowerCase();

    const filtered =
      STOCK.filter(i=>
        i.name.toLowerCase().includes(keyword)
      );

    renderStock(filtered);
  });

loadDashboard();

setInterval(loadStock, 5000);
setInterval(loadLogs, 10000);

</script>

</body>
</html>
