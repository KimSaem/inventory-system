<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventory ERP AI PRO</title>

<link rel="stylesheet" href="/css/style.css">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f5f5f7;
}

.page-bg{
  position:fixed;
  inset:0;
  background:linear-gradient(120deg,#f5f5f7,#ffffff);
  z-index:-1;
}

.hero{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:white;
  border-bottom:1px solid #eee;
}

.hero-buttons button{
  margin-left:10px;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.ai-main-btn{background:#111;color:#fff;}
.order-main-btn{background:#0071e3;color:#fff;}
.pay-btn{background:#34c759;color:white;}

.topbar{
  display:flex;
  gap:10px;
  padding:10px 20px;
}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  flex:1;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px;
  padding:20px;
}

.stock-card{
  background:white;
  padding:12px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.status.good{color:green;}
.status.medium{color:orange;}
.status.low{color:red;}
</style>

</head>

<body>

<div class="page-bg"></div>

<header class="hero">

  <div>
    <h1>🍣 ERP AI PRO</h1>
    <p>Realtime Inventory + POS + AI System</p>
  </div>

  <div class="hero-buttons">

    <button class="ai-main-btn" onclick="runAI()">AI</button>
    <button class="order-main-btn" onclick="generateOrders()">ORDER</button>
    <a href="/pos.html"><button class="pay-btn">POS</button></a>

  </div>

</header>

<section class="topbar">

  <div class="card">TOTAL<br><b id="totalItems">0</b></div>
  <div class="card">HOME<br><b id="homeStock">0</b></div>
  <div class="card">STORE<br><b id="storeStock">0</b></div>

</section>

<input id="search" style="margin:10px 20px;padding:10px;width:90%;" placeholder="search..." />

<section id="stockGrid" class="grid"></section>

<section style="padding:20px;">
  <h3>📜 Logs</h3>
  <div id="logs"></div>
</section>

<script>

let STOCK = [];
let CACHE = {
  lastUpdate:0
};

const REFRESH_MS = 3000;

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded",()=>{
  loadAll();

  document.getElementById("search").addEventListener("input",e=>{
    const k = e.target.value.toLowerCase();
    render(STOCK.filter(i=>i.name.toLowerCase().includes(k)));
  });
});

/* =========================
   LOAD ALL
========================= */
async function loadAll(){
  await loadStock();
  await loadLogs();
}

/* =========================
   STOCK (REALTIME SAFE)
========================= */
async function loadStock(){

  const res = await fetch("/api/stock");
  const json = await res.json();

  if(!json.success) return;

  STOCK = json.data || [];

  STOCK.forEach(i=>{
    i.ai = calcAI(i);
  });

  render(STOCK);
  updateKPI(STOCK);
}

/* =========================
   AI LOGIC
========================= */
function calcAI(i){

  const total =
    Number(i.home_qty||0)+Number(i.store_qty||0);

  const min = Number(i.min_stock||15);

  let r = Math.ceil((min-total)*1.2);

  if(r < 0) r = 0;
  if(r > 0 && r < 3) r = 3;

  return r;
}

/* =========================
   UI
========================= */
function render(list){

  document.getElementById("stockGrid").innerHTML =
    list.map(i=>{

      const total =
        Number(i.home_qty||0)+Number(i.store_qty||0);

      let status="GOOD";
      let cls="good";

      if(total<=5){status="LOW";cls="low";}
      else if(total<=15){status="MEDIUM";cls="medium";}

      return `
      <div class="stock-card">

        <h4>${i.name}</h4>

        <div>🏢 ${i.supplier}</div>
        <div>💰 $${i.price}</div>

        <div>HOME: ${i.home_qty}</div>
        <div>STORE: ${i.store_qty}</div>

        <div>AI: ${i.ai}</div>

        <div class="status ${cls}">${status}</div>

        <input id="q-${i.id}" type="number" value="1"/>

        <button onclick="sell(${i.id})">SELL</button>

      </div>
      `;
    }).join("");
}

/* =========================
   SELL (POS HOOK CORE)
========================= */
async function sell(id){

  const qty = Number(document.getElementById("q-"+id).value||1);

  await fetch("/api/order",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({stock_id:id,qty})
  });

  await loadAll();
}

/* =========================
   LOGS
========================= */
async function loadLogs(){

  const res = await fetch("/api/log");
  const json = await res.json();

  document.getElementById("logs").innerHTML =
    (json.data||[]).map(l=>`
      <div>${l.action} | ${l.qty} | ${l.note}</div>
    `).join("");
}

/* =========================
   KPI
========================= */
function updateKPI(items){

  document.getElementById("totalItems").innerText = items.length;

  document.getElementById("homeStock").innerText =
    items.reduce((a,b)=>a+Number(b.home_qty||0),0);

  document.getElementById("storeStock").innerText =
    items.reduce((a,b)=>a+Number(b.store_qty||0),0);
}

/* =========================
   AI + ORDER
========================= */
async function runAI(){
  await fetch("/api/ai-predict");
  loadAll();
}

async function generateOrders(){
  const res = await fetch("/api/generate-order");
  const json = await res.json();
  alert(JSON.stringify(json.orders,null,2));
}

/* =========================
   REALTIME LOOP
========================= */
setInterval(loadStock, REFRESH_MS);
setInterval(loadLogs, 5000);

</script>

</body>
</html>
