<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventory ERP AI PRO</title>

<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="page-bg"></div>

<header class="hero">

  <div>
    <h1>🍣 Inventory ERP AI PRO</h1>
    <p class="hero-sub">Enterprise Inventory + Sales + AI System</p>
  </div>

  <div class="hero-buttons">

    <button class="ai-main-btn" onclick="runAI()">
      🤖 AI Predict
    </button>

    <button class="order-main-btn" onclick="generateOrders()">
      📦 Generate Orders
    </button>

    <a href="/pos.html">
      <button class="pay-btn">
        🧾 POS SYSTEM
      </button>
    </a>

  </div>

</header>

<section class="topbar">

  <div class="card kpi-card">
    <div class="kpi-title">TOTAL ITEMS</div>
    <div class="kpi-value" id="totalItems">0</div>
  </div>

  <div class="card kpi-card">
    <div class="kpi-title">HOME STOCK</div>
    <div class="kpi-value" id="homeStock">0</div>
  </div>

  <div class="card kpi-card">
    <div class="kpi-title">STORE STOCK</div>
    <div class="kpi-value" id="storeStock">0</div>
  </div>

</section>

<input
  type="text"
  id="search"
  class="search"
  placeholder="🔍 Search inventory..."
/>

<section class="card add-section">

  <h2>➕ Add Item</h2>

  <div class="add-box">

    <input id="newName" placeholder="Item name">
    <input id="newHome" type="number" placeholder="Home qty">
    <input id="newStore" type="number" placeholder="Store qty">

    <select id="newCategory">
      <option value="NIGIRI">NIGIRI</option>
      <option value="ROLL">ROLL</option>
      <option value="DONBURI">DONBURI</option>
      <option value="DRINK">DRINK</option>
      <option value="SIDE">SIDE</option>
    </select>

    <select id="newSupplier">
      <option>길모아</option>
      <option>서비스푸드</option>
      <option>비드푸드</option>
      <option>메가푸드</option>
      <option>JFC</option>
      <option>도쿄푸드</option>
      <option>오션푸드</option>
    </select>

    <input id="newPrice" type="number" placeholder="Price">

    <button onclick="createItem()">Add</button>

  </div>

</section>

<div id="stockGrid" class="grid"></div>

<section class="logs">
  <div class="logs-header">📜 Logs</div>
  <div id="logs"></div>
</section>

<script>

let STOCK = [];

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
  loadDashboard();

  document.getElementById("search")
  ?.addEventListener("input",(e)=>{

    const k = e.target.value.toLowerCase();

    renderStock(
      STOCK.filter(i =>
        (i.name||"").toLowerCase().includes(k)
      )
    );
  });
});

/* AI */
function calculateAIOrder(item){

  const total =
    Number(item.home_qty||0) +
    Number(item.store_qty||0);

  const min = Number(item.min_stock||15);

  let r = Math.ceil((min-total)*1.3);

  if(r<0) r=0;
  if(r>0 && r<3) r=3;

  return r;
}

/* LOAD */
async function loadDashboard(){
  await loadStock();
  await loadLogs();
}

async function loadStock(){

  const res = await fetch("/api/stock");
  const json = await res.json();

  if(!json.success) return;

  STOCK = json.data || [];

  STOCK.forEach(i=>{
    i.ai_order = calculateAIOrder(i);
  });

  renderStock(STOCK);
  updateKPI(STOCK);
}

/* KPI */
function updateKPI(items){

  document.getElementById("totalItems").innerText = items.length;

  document.getElementById("homeStock").innerText =
    items.reduce((a,b)=>a+Number(b.home_qty||0),0);

  document.getElementById("storeStock").innerText =
    items.reduce((a,b)=>a+Number(b.store_qty||0),0);
}

/* RENDER */
function renderStock(items){

  const grid = document.getElementById("stockGrid");

  grid.innerHTML = items.map(i=>{

    const total =
      Number(i.home_qty||0)+Number(i.store_qty||0);

    let cls="good";
    let status="GOOD";

    if(total<=5){cls="low";status="LOW";}
    else if(total<=15){cls="medium";status="MEDIUM";}

    return `
      <div class="stock-card">

        <div class="stock-title">${i.name}</div>

        <div>🏢 ${i.supplier}</div>
        <div>💰 $${Number(i.price||0)}</div>

        <div>HOME: ${i.home_qty}</div>
        <div>STORE: ${i.store_qty}</div>

        <div>AI: ${i.ai_order}</div>

        <div class="status ${cls}">${status}</div>

        <div class="actions">

          <input id="home-${i.id}" type="number" value="${i.home_qty}">
          <input id="store-${i.id}" type="number" value="${i.store_qty}">

        </div>

        <div class="actions">

          <button onclick="adjust(${i.id})">Adjust</button>
          <button onclick="sell(${i.id})">Sell</button>

        </div>

        <div class="actions">

          <button onclick="move(${i.id},'home','store')">H→S</button>
          <button onclick="move(${i.id},'store','home')">S→H</button>

        </div>

      </div>
    `;
  }).join("");
}

/* CREATE */
async function createItem(){

  const body = {
    name: newName.value,
    home_qty: Number(newHome.value||0),
    store_qty: Number(newStore.value||0),
    supplier: newSupplier.value,
    category: newCategory.value,
    price: Number(newPrice.value||5),
    min_stock:15,
    ai_enabled:true
  };

  await fetch("/api/item",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });

  loadDashboard();
}

/* SELL (POS HOOK) */
async function sell(id){

  const qty = 1;

  await fetch("/api/order",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({stock_id:id,qty})
  });

  loadDashboard();
}

/* ADJUST */
async function adjust(id){

  const home = Number(document.getElementById(`home-${id}`).value||0);
  const store = Number(document.getElementById(`store-${id}`).value||0);

  await fetch("/api/adjust",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({stock_id:id,home_qty:home,store_qty:store})
  });

  loadDashboard();
}

/* MOVE */
async function move(id,from,to){

  await fetch("/api/transfer",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      stock_id:id,
      qty:1,
      from,
      to
    })
  });

  loadDashboard();
}

/* LOG */
async function loadLogs(){

  const res = await fetch("/api/log");
  const json = await res.json();

  document.getElementById("logs").innerHTML =
    (json.data||[]).map(l=>`
      <div>${l.action} | ${l.qty}</div>
    `).join("");
}

/* AI */
async function runAI(){
  await fetch("/api/ai-predict");
  loadDashboard();
}

/* ORDER */
async function generateOrders(){

  const res = await fetch("/api/generate-order");
  const json = await res.json();

  alert(JSON.stringify(json.orders,null,2));
}

</script>

</body>
</html>
