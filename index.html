<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>재고 시스템</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 30px;
      background: #f5f5f5;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
    }

    .item {
      background: white;
      border: 1px solid #ddd;
      margin: 10px auto;
      padding: 15px;
      width: 300px;
      border-radius: 8px;
    }

    .btn {
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>📦 재고 관리 시스템</h2>

<input id="name" placeholder="물건 이름">
<input id="qty" type="number" placeholder="수량">
<button onclick="add()">추가</button>

<div id="list"></div>

<script>
async function load() {
  try {
    const res = await fetch("/api/items");

    if (!res.ok) {
      throw new Error("API 오류");
    }

    const data = await res.json();

    document.getElementById("list").innerHTML =
      data.map(i => `
        <div class="item">
          <b>${i.name}</b><br>
          수량: ${i.qty}<br><br>

          <button class="btn" onclick="change(${i.id}, 1)">➕</button>
          <button class="btn" onclick="change(${i.id}, -1)">➖</button>
          <button class="btn" onclick="del(${i.id})">삭제</button>
        </div>
      `).join("");

  } catch (err) {
    console.error(err);
    document.getElementById("list").innerHTML = "⚠️ 데이터 불러오기 실패";
  }
}

async function add() {
  const name = document.getElementById("name").value;
  const qty = parseInt(document.getElementById("qty").value);

  if (!name || isNaN(qty)) {
    alert("이름과 수량 입력해");
    return;
  }

  await fetch("/api/items", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, qty })
  });

  document.getElementById("name").value = "";
  document.getElementById("qty").value = "";

  load();
}

async function del(id) {
  await fetch("/api/items", {
    method: "DELETE",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id })
  });

  load();
}

// ➕➖ 기능 (추가로 필요한 API)
async function change(id, diff) {
  await fetch("/api/items/update", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id, diff })
  });

  load();
}

load();
</script>

</body>
</html>
