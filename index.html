<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Inventory ERP</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      background:#f5f5f7;
      color:#111;
      padding:20px;
    }

    h1{
      font-size:32px;
      margin-bottom:25px;
      font-weight:700;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      border-radius:24px;
      padding:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.05);
      transition:0.2s;
    }

    .card:hover{
      transform:translateY(-3px);
    }

    .title{
      font-size:24px;
      font-weight:700;
      margin-bottom:20px;
    }

    .qty-row{
      display:flex;
      justify-content:space-between;
      margin-bottom:12px;
      font-size:18px;
    }

    .qty{
      font-weight:700;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      background:#f0f0f0;
      border-radius:14px;
      margin-top:12px;
      font-size:16px;
    }

    .actions{
      display:flex;
      gap:10px;
      margin-top:15px;
    }

    button{
      flex:1;
      border:none;
      padding:14px;
      border-radius:14px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:0.2s;
    }

    .to-store{
      background:#0071e3;
      color:white;
    }

    .to-home{
      background:#34c759;
      color:white;
    }

    button:hover{
      opacity:0.9;
    }

    .loading{
      font-size:18px;
      opacity:0.6;
    }
  </style>
</head>

<body>

<h1>📦 Inventory ERP</h1>

<div id="app" class="grid">
  <div class="loading">Loading...</div>
</div>

<script>

async function loadStock() {

  const app = document.getElementById("app");

  try {

    const res = await fetch("/api/stock");
    const json = await res.json();

    if(!json.success){
      throw new Error(json.error || "SERVER_ERROR");
    }

    const items = json.data;

    app.innerHTML = items.map(item => `
      <div class="card">

        <div class="title">${item.name}</div>

        <div class="qty-row">
          <span>🏠 Home</span>
          <span class="qty">${item.home_qty}</span>
        </div>

        <div class="qty-row">
          <span>🏪 Store</span>
          <span class="qty">${item.store_qty}</span>
        </div>

        <input
          type="number"
          id="qty-${item.id}"
          value="1"
          min="1"
        />

        <div class="actions">

          <button
            class="to-store"
            onclick="move(${item.id}, 'home', 'store')"
          >
            Home → Store
          </button>

          <button
            class="to-home"
            onclick="move(${item.id}, 'store', 'home')"
          >
            Store → Home
          </button>

        </div>

      </div>
    `).join("");

  } catch(err){

    app.innerHTML = `
      <div class="card">
        ❌ ${err.message}
      </div>
    `;

    console.error(err);
  }
}

async function move(stock_id, from, to){

  const qty = parseInt(
    document.getElementById(`qty-${stock_id}`).value
  );

  if(!qty || qty <= 0){
    alert("수량 입력");
    return;
  }

  try{

    const res = await fetch("/api/transfer",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        stock_id,
        qty,
        from,
        to
      })
    });

    const json = await res.json();

    if(!json.success){
      throw new Error(json.error);
    }

    await loadStock();

  }catch(err){
    alert(err.message);
  }
}

loadStock();

</script>

</body>
</html>
