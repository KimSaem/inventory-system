<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>재고 시스템</title>
  <style>
    body { font-family: Arial; text-align:center; }
    .item { border:1px solid #ddd; margin:10px auto; padding:10px; width:300px; }
    button { padding:5px 10px; margin:3px; }
  </style>
</head>
<body>

<h2>📦 재고 관리</h2>

<div id="list"></div>

<script>
async function load() {
  const res = await fetch("/api/stock");
  const data = await res.json();

  document.getElementById("list").innerHTML =
    data.map(i => `
      <div class="item">
        <b>${i.name}</b><br>
        🏠 집: ${i.home_qty || 0}<br>
        🏪 가게: ${i.store_qty || 0}<br><br>

        <button onclick="move(${i.id}, 5)">집 → 가게 +5</button>
      </div>
    `).join("");
}

async function move(id, qty) {
  await fetch("/api/transfer", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      item_id: id,
      qty: qty
    })
  });

  load();
}

load();
</script>

</body>
</html>
