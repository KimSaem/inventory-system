<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Inventory System</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6f8;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    #list {
      max-width: 600px;
      margin: 0 auto;
    }

    .item {
      background: #fff;
      border: 1px solid #e6e6e6;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 12px;
      text-align: left;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .qty {
      font-size: 14px;
      margin: 3px 0;
    }

    input {
      width: 80px;
      padding: 6px;
      margin-top: 8px;
    }

    button {
      padding: 6px 10px;
      margin-left: 5px;
      cursor: pointer;
      border: none;
      background: #2d7ef7;
      color: white;
      border-radius: 5px;
    }

    button:hover {
      background: #1c5fd6;
    }

    .error {
      color: red;
      margin-top: 20px;
    }

    .loading {
      color: #666;
    }
  </style>
</head>

<body>

<h2>📦 재고 관리 시스템</h2>

<div id="list" class="loading">Loading...</div>

<script>
/**
 * 공통 API 호출
 */
async function fetchStock() {
  const res = await fetch("/api/stock");
  const result = await res.json();

  return result;
}

/**
 * UI 렌더링
 */
function renderList(data) {
  const list = document.getElementById("list");

  if (!Array.isArray(data)) {
    list.innerHTML = `<div class="error">데이터 형식 오류</div>`;
    return;
  }

  list.innerHTML = data.map(item => `
    <div class="item">
      <div class="title">${item.name ?? "Unnamed"}</div>

      <div class="qty">🏠 집: ${item.home_qty ?? 0}</div>
      <div class="qty">🏪 가게: ${item.store_qty ?? 0}</div>

      <div style="margin-top:10px;">
        <input type="number" id="qty-${item.id}" value="1" min="1">

        <button onclick="moveStock(${item.id})">
          이동
        </button>
      </div>
    </div>
  `).join("");
}

/**
 * 데이터 로드
 */
async function load() {
  try {
    const result = await fetchStock();

    if (!result || result.success === false) {
      document.getElementById("list").innerHTML =
        `<div class="error">데이터 로딩 실패</div>`;
      return;
    }

    renderList(result.data);

  } catch (err) {
    console.error(err);
    document.getElementById("list").innerHTML =
      `<div class="error">서버 오류</div>`;
  }
}

/**
 * 재고 이동
 */
async function moveStock(id) {
  const input = document.getElementById(`qty-${id}`);
  const qty = parseInt(input.value);

  if (!qty || qty <= 0) {
    alert("수량을 입력하세요");
    return;
  }

  try {
    await fetch("/api/transfer", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        stock_id: id,
        qty: qty,
        type: "OUT"
      })
    });

    await load();

  } catch (err) {
    console.error(err);
    alert("이동 실패");
  }
}

// 초기 실행
load();
</script>

</body>
</html>
