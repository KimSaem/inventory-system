<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SUSHI POS PRO</title>

<link rel="stylesheet" href="/css/pos.css">

<style>
body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background:#f5f5f7;
}

.container{
  display:flex;
  height:100vh;
}

.left{
  flex:2;
  padding:20px;
  overflow:auto;
}

.right{
  flex:1;
  background:white;
  padding:20px;
  border-left:1px solid #eee;
}

.menu-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
}

.menu-item{
  background:white;
  border-radius:16px;
  padding:14px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  cursor:pointer;
}

.menu-name{
  font-weight:700;
}

.menu-price{
  color:#0071e3;
  margin-top:6px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.pay-btn{
  width:100%;
  padding:14px;
  background:#111;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  margin-top:20px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <h2>🍣 SUSHI POS</h2>

    <input id="search" placeholder="Search menu..." />

    <div id="menuGrid" class="menu-grid"></div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <h3>🛒 CART</h3>

    <div id="cart"></div>

    <div style="margin-top:10px;">
      Items: <span id="itemCount">0</span>
    </div>

    <div style="font-weight:700; margin-top:10px;">
      Total: <span id="totalPrice">$0</span>
    </div>

    <button class="pay-btn" onclick="checkout()">
      PAY NOW
    </button>

  </div>

</div>

<script>

let MENU = [];
let CART = [];

/* =========================
   LOAD MENU
========================= */
async function loadMenu(){

  const res = await fetch("/api/stock");
  const json = await res.json();

  MENU = json.data || [];

  renderMenu(MENU);
}

/* =========================
   RENDER MENU
========================= */
function renderMenu(items){

  document.getElementById("menuGrid").innerHTML =
    items.map(i => `
      <div class="menu-item" onclick="addToCart(${i.id})">
        <div class="menu-name">${i.name}</div>
        <div class="menu-price">$${Number(i.price || 5)}</div>
      </div>
    `).join("");
}
async function printReceipt(data){

  const receipt = {
    store: "OKARA SUSHI",
    items: data.items,
    total: data.total_amount,
    time: new Date().toISOString()
  };

  await fetch("/api/print", {
    method: "POST",
    headers: {
      "Content-Type":"application/json"
    },
    body: JSON.stringify(receipt)
  });
}

/* =========================
   ADD TO CART
========================= */
function addToCart(id){

  const item = MENU.find(i => i.id === id);
  if(!item) return;

  const existing = CART.find(i => i.id === id);

  if(existing){
    existing.qty++;
  }else{
    CART.push({
      id:item.id,
      name:item.name,
      price:Number(item.price || 5),
      qty:1
    });
  }

  renderCart();
}

/* =========================
   CART RENDER
========================= */
function renderCart(){

  document.getElementById("cart").innerHTML =
    CART.map(i => `
      <div class="cart-item">
        <div>${i.name}</div>

        <div>
          <button onclick="minus(${i.id})">-</button>
          ${i.qty}
          <button onclick="plus(${i.id})">+</button>
        </div>
      </div>
    `).join("");

  updateSummary();
}

function plus(id){
  const item = CART.find(i=>i.id===id);
  if(item) item.qty++;
  renderCart();
}

function minus(id){
  const item = CART.find(i=>i.id===id);
  if(!item) return;

  item.qty--;
  if(item.qty <= 0){
    CART = CART.filter(i=>i.id !== id);
  }

  renderCart();
}

/* =========================
   SUMMARY
========================= */
function updateSummary(){

  const totalItems = CART.reduce((a,b)=>a+b.qty,0);

  const totalPrice = CART.reduce((a,b)=>
    a + b.qty * b.price
  ,0);

  document.getElementById("itemCount").innerText = totalItems;
  document.getElementById("totalPrice").innerText = "$" + totalPrice.toFixed(2);
}

/* =========================
   ENTERPRISE CHECKOUT
   👉 핵심: /api/sales ONLY
========================= */
async function checkout(){

  if(CART.length === 0){
    alert("Cart empty");
    return;
  }

  try{

    const res = await fetch("/api/sales",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        items:CART
      })
    });

    const json = await res.json();

    if(!json.success){
      alert(json.error);
      return;
    }

    alert("PAYMENT SUCCESS");

    CART = [];
    renderCart();
    loadMenu();

  }catch(e){
    console.error(e);
    alert("ERROR");
  }
}

/* =========================
   SEARCH
========================= */
document.getElementById("search")
.addEventListener("input",(e)=>{

  const k = e.target.value.toLowerCase();

  renderMenu(
    MENU.filter(i =>
      i.name.toLowerCase().includes(k)
    )
  );

});

loadMenu();

</script>

</body>
</html>
