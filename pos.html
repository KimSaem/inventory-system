<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SUSHI POS</title>

<link rel="stylesheet" href="/css/pos.css">

</head>

<body>

<div class="category-tabs">

  <button onclick="filterCategory('ALL')">ALL</button>
  <button onclick="filterCategory('NIGIRI')">NIGIRI</button>
  <button onclick="filterCategory('ROLL')">ROLL</button>
  <button onclick="filterCategory('DONBURI')">DONBURI</button>
  <button onclick="filterCategory('DRINK')">DRINK</button>
  <button onclick="filterCategory('SIDE')">SIDE</button>

</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <div class="topbar">
      <h1>🍣 SUSHI POS</h1>

      <input id="search" placeholder="Search menu..." />
    </div>

    <!-- CREATE ITEM (POS에서도 추가 가능하게 유지) -->
    <div class="create-box">

      <input id="newName" placeholder="Name">
      <input id="newPrice" type="number" placeholder="Price">

      <select id="newCategory">
        <option value="NIGIRI">NIGIRI</option>
        <option value="ROLL">ROLL</option>
        <option value="DONBURI">DONBURI</option>
        <option value="DRINK">DRINK</option>
        <option value="SIDE">SIDE</option>
      </select>

      <button onclick="createItem()">+ Add</button>

    </div>

    <div id="menuGrid" class="menu-grid"></div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="cart-header">🛒 ORDER</div>

    <div id="cart" class="cart"></div>

    <div class="summary">

      <div class="summary-row">
        <span>Items</span>
        <span id="itemCount">0</span>
      </div>

      <div class="summary-row total">
        <span>Total</span>
        <span id="totalPrice">$0.00</span>
      </div>

      <button class="pay-btn" onclick="checkout()">
        PAY NOW
      </button>

    </div>

  </div>

</div>

<script>

let MENU = [];
let FILTERED_MENU = [];
let CART = [];

/* ---------------- MENU LOAD ---------------- */
async function loadMenu() {
  const res = await fetch("/api/stock");
  const json = await res.json();

  MENU = json.data || [];
  FILTERED_MENU = MENU;

  renderMenu(MENU);
}

/* ---------------- RENDER MENU ---------------- */
function renderMenu(items) {

  document.getElementById("menuGrid").innerHTML =
    items.map(item => {

      const stock =
        Number(item.home_qty || 0) +
        Number(item.store_qty || 0);

      return `
        <div class="menu-item" onclick="addToCart(${item.id})">

          <div class="menu-name">${item.name}</div>

          <div class="menu-category">
            ${item.category || "MENU"}
          </div>

          <div class="menu-stock">
            Stock: ${stock}
          </div>

          <div class="menu-price">
            $${Number(item.price || 5).toFixed(2)}
          </div>

        </div>
      `;
    }).join("");
}

/* ---------------- FILTER ---------------- */
function filterCategory(cat) {

  if (cat === "ALL") {
    FILTERED_MENU = MENU;
  } else {
    FILTERED_MENU = MENU.filter(i =>
      (i.category || "").toUpperCase() === cat
    );
  }

  renderMenu(FILTERED_MENU);
}

/* ---------------- CART ---------------- */
function addToCart(id) {

  const item = MENU.find(i => i.id === id);
  if (!item) return;

  const existing = CART.find(i => i.id === id);

  if (existing) {
    existing.qty++;
  } else {
    CART.push({
      id: item.id,
      name: item.name,
      price: Number(item.price || 5),
      qty: 1
    });
  }

  renderCart();
}

function renderCart() {

  document.getElementById("cart").innerHTML =
    CART.map(i => `
      <div class="cart-item">

        <div>
          <div class="cart-name">${i.name}</div>
          <div class="cart-price">$${i.price}</div>
        </div>

        <div class="cart-controls">

          <button onclick="dec(${i.id})">-</button>
          <span>${i.qty}</span>
          <button onclick="inc(${i.id})">+</button>

        </div>

      </div>
    `).join("");

  updateSummary();
}

function inc(id){
  const i = CART.find(x => x.id === id);
  if(i) i.qty++;
  renderCart();
}

function dec(id){
  const i = CART.find(x => x.id === id);
  if(!i) return;

  i.qty--;

  if(i.qty <= 0){
    CART = CART.filter(x => x.id !== id);
  }

  renderCart();
}

/* ---------------- SUMMARY ---------------- */
function updateSummary() {

  const count = CART.reduce((a,b)=>a+b.qty,0);
  const total = CART.reduce((a,b)=>a+b.qty*b.price,0);

  document.getElementById("itemCount").innerText = count;
  document.getElementById("totalPrice").innerText = "$" + total.toFixed(2);
}

/* ---------------- CHECKOUT ---------------- */
async function checkout() {

  if (CART.length === 0) return alert("Cart empty");

  for (const i of CART) {
    await fetch("/api/order", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        stock_id: i.id,
        qty: i.qty
      })
    });
  }

  alert("DONE");

  CART = [];
  renderCart();
  loadMenu();
}

/* ---------------- CREATE ITEM ---------------- */
async function createItem() {

  const name = document.getElementById("newName").value;
  const price = Number(document.getElementById("newPrice").value || 5);
  const category = document.getElementById("newCategory").value;

  const res = await fetch("/api/item", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      name,
      price,
      category,
      home_qty:0,
      store_qty:0,
      supplier:"POS",
      min_stock:15,
      ai_enabled:true,
      options:[]
    })
  });

  const json = await res.json();

  if(!json.success){
    alert(json.error);
    return;
  }

  loadMenu();
}

/* ---------------- SEARCH ---------------- */
document.getElementById("search")
.addEventListener("input", (e)=>{

  const k = e.target.value.toLowerCase();

  const filtered = FILTERED_MENU.filter(i =>
    i.name.toLowerCase().includes(k)
  );

  renderMenu(filtered);
});

/* ---------------- INIT ---------------- */
loadMenu();

</script>

</body>
</html>
