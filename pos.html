<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<title>SUSHI POS ENTERPRISE</title>

<link rel="stylesheet" href="/css/pos.css">

</head>

<body>

<div class="app">

  <!-- LEFT -->

  <section class="left">

    <div class="topbar">

      <div>
        <h1>🍣 SUSHI POS</h1>
        <p>Enterprise AI POS</p>
      </div>

      <input
        id="search"
        placeholder="Search..."
      />

    </div>

    <!-- CATEGORY -->

    <div class="categories">

      <button onclick="filterMenu('ALL')">
        ALL
      </button>

      <button onclick="filterMenu('NIGIRI')">
        NIGIRI
      </button>

      <button onclick="filterMenu('ROLL')">
        ROLL
      </button>

      <button onclick="filterMenu('DONBURI')">
        DONBURI
      </button>

      <button onclick="filterMenu('DRINK')">
        DRINK
      </button>

    </div>

    <!-- MENU -->

    <div id="menuGrid" class="menu-grid"></div>

  </section>

  <!-- RIGHT -->

  <section class="right">

    <div class="cart-header">

      <h2>🛒 CART</h2>

      <button onclick="clearCart()">
        CLEAR
      </button>

    </div>

    <div id="cart"></div>

    <div class="summary">

      <div class="row">
        <span>Items</span>
        <span id="itemCount">0</span>
      </div>

      <div class="row total">
        <span>Total</span>
        <span id="totalPrice">$0.00</span>
      </div>

      <button
        class="checkout"
        onclick="checkout()"
      >
        PAY NOW
      </button>

    </div>

    <!-- ADMIN -->

    <div class="admin">

      <h3>⚙ MENU MANAGER</h3>

      <input id="name" placeholder="Menu name">

      <input id="price" type="number" placeholder="Price">

      <select id="category">

        <option>NIGIRI</option>
        <option>ROLL</option>
        <option>DONBURI</option>
        <option>DRINK</option>

      </select>

      <button onclick="createMenu()">
        ADD MENU
      </button>

    </div>

  </section>

</div>

<script src="/js/pos.js"></script>

</body>
</html>
