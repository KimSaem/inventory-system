<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OKARA POS</title>

<link rel="stylesheet" href="/css/pos.css"/>

</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <div class="topbar">

      <div>
        <h1>🍣 OKARA POS</h1>
        <div class="sub">
          Smart Sushi POS System
        </div>
      </div>

      <input
        id="search"
        placeholder="Search menu..."
      />

    </div>

    <!-- CATEGORY -->
    <div class="category-tabs">

      <button onclick="filterMenu('ALL')">
        ALL
      </button>

      <button onclick="filterMenu('NIGIRI')">
        NIGIRI
      </button>

      <button onclick="filterMenu('ROLL')">
        ROLL
      </button>

      <button onclick="filterMenu('DONBURI')">
        DONBURI
      </button>

      <button onclick="filterMenu('SIDE')">
        SIDE
      </button>

      <button onclick="filterMenu('DRINK')">
        DRINK
      </button>

    </div>

    <!-- MENU -->
    <div
      id="menuGrid"
      class="menu-grid"
    ></div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="cart-header">
      🛒 ORDER CART
    </div>

    <div
      id="cart"
      class="cart"
    ></div>

    <div class="summary">

      <div class="summary-row">
        <span>Items</span>
        <span id="itemCount">0</span>
      </div>

      <div class="summary-row total">
        <span>Total</span>
        <span id="totalPrice">$0.00</span>
      </div>

      <button
        class="pay-btn"
        onclick="checkout()"
      >
        PAY NOW
      </button>

    </div>

  </div>

</div>

<script>

let MENU = [];
let FILTERED = [];
let CART = [];

async function loadMenu(){

  const res =
    await fetch("/api/stock");

  const json =
    await res.json();

  MENU = json.data || [];

  FILTERED = MENU;

  renderMenu(FILTERED);
}

function renderMenu(items){

  document.getElementById("menuGrid")
    .innerHTML =

    items.map(item => `

      <div
        class="menu-item"
        onclick="addToCart(${item.id})"
      >

        <div class="menu-name">
          ${item.name}
        </div>

        <div class="menu-category">
          ${item.category || ""}
        </div>

        <div class="menu-price">
          $${Number(item.price || 1.8).toFixed(2)}
        </div>

      </div>

    `).join("");
}

function filterMenu(category){

  if(category === "ALL"){

    FILTERED = MENU;

  }else{

    FILTERED =
      MENU.filter(i =>
        (i.category || "")
          .toUpperCase() === category
      );
  }

  renderMenu(FILTERED);
}

function addToCart(id){

  const item =
    MENU.find(i => i.id === id);

  if(!item) return;

  const existing =
    CART.find(i => i.id === id);

  if(existing){

    existing.qty++;

  }else{

    CART.push({
      id:item.id,
      name:item.name,
      price:Number(item.price || 1.8),
      qty:1
    });
  }

  renderCart();
}

function renderCart(){

  document.getElementById("cart")
    .innerHTML =

    CART.map(item => `

      <div class="cart-item">

        <div>

          <div class="cart-name">
            ${item.name}
          </div>

          <div class="cart-price">
            $${item.price.toFixed(2)}
          </div>

        </div>

        <div class="cart-controls">

          <button
            onclick="minus(${item.id})"
          >
            −
          </button>

          <span>${item.qty}</span>

          <button
            onclick="plus(${item.id})"
          >
            +
          </button>

        </div>

      </div>

    `).join("");

  updateSummary();
}

function plus(id){

  const item =
    CART.find(i => i.id === id);

  if(item){
    item.qty++;
  }

  renderCart();
}

function minus(id){

  const item =
    CART.find(i => i.id === id);

  if(!item) return;

  item.qty--;

  if(item.qty <= 0){

    CART =
      CART.filter(i => i.id !== id);
  }

  renderCart();
}

function updateSummary(){

  const totalItems =
    CART.reduce((a,b)=>a+b.qty,0);

  const totalPrice =
    CART.reduce(
      (a,b)=>a + (b.qty * b.price),
      0
    );

  document.getElementById("itemCount")
    .innerText = totalItems;

  document.getElementById("totalPrice")
    .innerText =
      "$" + totalPrice.toFixed(2);
}

async function checkout(){

  if(CART.length === 0){

    alert("Cart empty");
    return;
  }

  const res =
    await fetch("/api/sales",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        items:CART
      })
    });

  const json =
    await res.json();

  if(!json.success){

    alert(json.error);
    return;
  }

  alert(
    "PAYMENT SUCCESS\n\n" +
    "TOTAL: $" +
    json.total_amount.toFixed(2)
  );

  CART = [];

  renderCart();

  loadMenu();
}

document
  .getElementById("search")
  .addEventListener("input",(e)=>{

    const keyword =
      e.target.value.toLowerCase();

    renderMenu(

      FILTERED.filter(i =>
        i.name
          .toLowerCase()
          .includes(keyword)
      )

    );
  });

loadMenu();

</script>

</body>
</html>
